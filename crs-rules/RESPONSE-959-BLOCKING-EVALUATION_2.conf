    phase:4,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.24.0',\
    skipAfter:'END-RESPONSE-959-BLOCKING-EVALUATION'"

# -= Paranoia Level 3 =- (apply only when tx.detection_paranoia_level is sufficiently high: 3 or higher)
#
SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 4" \
    "id:959017,\
