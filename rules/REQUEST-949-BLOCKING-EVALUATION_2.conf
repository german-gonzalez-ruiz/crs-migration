# -=[ Anomaly Mode: Overall Transaction Anomaly Score ]=-
#
# if early blocking is active, check threshold in phase 1

SecRule TX:BLOCKING_INBOUND_ANOMALY_SCORE "@ge %{tx.inbound_anomaly_score_threshold}" \
    "id:949111,\
    phase:1,\
    deny,\
    t:none,\
    msg:'Inbound Anomaly Score Exceeded in phase 1 (Total Score: %{TX.BLOCKING_INBOUND_ANOMALY_SCORE})',\
    tag:'anomaly-evaluation',\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    chain"
    SecRule TX:EARLY_BLOCKING "@eq 1"

# always check threshold in phase 2
SecRule TX:BLOCKING_INBOUND_ANOMALY_SCORE "@ge %{tx.inbound_anomaly_score_threshold}" \
    "id:949110,\
    phase:2,\
    deny,\
    t:none,\
    msg:'Inbound Anomaly Score Exceeded (Total Score: %{TX.BLOCKING_INBOUND_ANOMALY_SCORE})',\
    tag:'anomaly-evaluation',\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0'"

SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 1" \
    "id:949011,\
    phase:1,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 1" \
    "id:949012,\
    phase:2,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

# -= Paranoia Level 1 (default) =- (apply only when tx.detection_paranoia_level is sufficiently high: 1 or higher)
#
SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 2" \
    "id:949013,\
    phase:1,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 2" \
    "id:949014,\
    phase:2,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

# -= Paranoia Level 2 =- (apply only when tx.detection_paranoia_level is sufficiently high: 2 or higher)
#
SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 3" \
    "id:949015,\
    phase:1,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 3" \
    "id:949016,\
    phase:2,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

# -= Paranoia Level 3 =- (apply only when tx.detection_paranoia_level is sufficiently high: 3 or higher)
#
SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 4" \
    "id:949017,\
    phase:1,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

SecRule TX:DETECTION_PARANOIA_LEVEL "@lt 4" \
    "id:949018,\
    phase:2,\
    pass,\
    nolog,\
    tag:'OWASP_CRS',\
    ver:'OWASP_CRS/4.25.0',\
    skipAfter:'END-REQUEST-949-BLOCKING-EVALUATION'"

# -= Paranoia Level 4 =- (apply only when tx.detection_paranoia_level is sufficiently high: 4 or higher)
#
#
# -= Paranoia Levels Finished =-
#

SecMarker END-REQUEST-949-BLOCKING-EVALUATION

